version: '3.8'

services:

  fastapi:
    image: riya7737/loan_prediction-fast:latest
    container_name: loan_api
    ports:
      - "8002:8000"
    restart: always
    networks:
      - loan-network

  streamlit:
    image: riya7737/loan_prediction_streamlit:latest
    container_name: loan_ui
    ports:
      - "8502:8501"
    depends_on:
      - fastapi
    restart: always
    networks:
      - loan-network
    environment:
      - API_URL=http://fastapi:8000
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_PORT=8501

networks:
  loan-network:
    driver: bridge